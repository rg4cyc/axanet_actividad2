name: Deploy AXANET

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Ejecutar pruebas antes de despliegue
        run: python -m pytest -v

      - name: Crear artifact de release
        run: |
          mkdir -p release
          cp -r src tests requirements.txt README.md release/
          echo "AXANET release generado desde main" > release/RELEASE_NOTES.txt

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: axanet-release
          path: release

      - name: Mensaje final
        run: echo "Deploy simulado completado para la versión estable."
